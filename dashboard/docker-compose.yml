version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/btc_valuation.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    volumes:
      - ./data:/app/data
      - ./resources:/app/resources:ro
    environment:
      - DATABASE_URL=sqlite:///data/btc_valuation.db
      - PYTHONPATH=/app
    depends_on:
      - api
    # Run once and exit (for cron scheduling)
    # Or use: command: ["python", "-m", "pipeline.src.scheduler", "schedule"]
    command: ["python", "-m", "pipeline.src.scheduler", "run"]

  webapp:
    build:
      context: ./webapp
      dockerfile: ../Dockerfile.webapp
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data:
